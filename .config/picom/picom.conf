#################################
#            Backend            #
#################################

backend = "egl";
vsync = true;
use-damage = true;

#################################
#          Performance          #
#################################

animations = false;
fading = false;

unredir-if-possible = true;
unredir-if-possible-delay = 0;

#################################
#            Opacity            #
#################################

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "90:class_g = 'Alacritty'",
  "85:class_g = 'fzf-filebrowser'",
  "80:class_g = 'dev.warp.Warp'",
  "90:class_g = 'i3bar'",
  "90:class_g = 'i3status'",
  "90:class_g = 'polybar'"
];

#################################
#            Shadows            #
#################################

shadow = false;

#################################
#             Blur              #
#################################

blur-method = "none";

#################################
#          Rounded Corners      #
#################################

corner-radius = 0;

#################################
#            Wintypes           #
#################################

wintypes:
{
  tooltip = {
    fade = false;
    shadow = false;
    opacity = 0.95;
    focus = true;
  };

  dock = {
    shadow = false;
    clip-shadow-above = true;
  };

  dnd = {
    shadow = false;
  };

  menu = {
    fade = false;
    shadow = false;
  };

  popup_menu = {
    opacity = 0.95;
    shadow = false;
  };

  dropdown_menu = {
    opacity = 0.95;
    shadow = false;
  };
};

#################################
#        Compatibility          #
#################################

detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

#################################
#           Logging             #
#################################

log-level = "warn";
