####################################
# Picom: Best Performance & Stability (Hybrid GPU)
####################################

backend = "egl";                  # Good for AMD + hybrid
vsync = true;
shadow = false;

####################################
# Smooth fades
####################################
fading = true;
fade-delta = 6;
fade-in-step = 0.05;
fade-out-step = 0.05;
no-fading-openclose = true;
no-fading-destroyed-argb = true;

####################################
# Transparency
####################################

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

# Rules for normal windows
opacity-rule = [
  "90:class_g = 'Alacritty'",
  "85:class_g = 'fzf-filebrowser'",
  "80:class_g = 'dev.warp.Warp'",
  "90:class_g = 'i3bar'",
  "90:class_g = 'i3status'",
  "90:class_g = 'Polybar'"
];

####################################
# IMPORTANT: Dock windows (Polybar fix)
####################################

wintypes:
{
  dock = {
    opacity = 0.9;
  };
};

####################################
# Background blur (optional)
####################################
# Uncomment if you want blur

# blur = {
#   method = "dual_kawase";
#   strength = 5;
# };
#
# blur-background = true;
# blur-background-frame = false;
# blur-background-fixed = false;

####################################
# Performance tuning
####################################

use-damage = true;
unredir-if-possible = false;
detect-rounded-corners = false;
detect-client-opacity = true;
detect-transient = true;

####################################
# EGL / GLX tuning
####################################

glx-no-stencil = true;
glx-copy-from-front = false;
experimental-backends = true;

####################################
# END
####################################
