#################################
#             Backend           #
#################################
backend = "egl";
vsync = true;
use-damage = true;

#################################
#          Animations           #
#################################
# Pibom-pijul / FT Labs branch specific
animations = true;
animation-stiffness = 110.0;
animation-dampening = 22.0;
animation-clamping = false;
animation-mass = 0.5;

transition-length = 200;

animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-transient-window = "zoom";
animation-for-workspace-switch-in = "zoom";
animation-for-workspace-switch-out = "zoom";

#################################
#             Fading            #
#################################
fading = true;
fade-delta = 4;
fade-in-step = 0.02;
fade-out-step = 0.02;
no-fading-openclose = false;

#################################
#        Opacity & Rules        #
#################################
inactive-opacity = 1.0;
active-opacity = 1.0;

# Removed the invalid "all_drawers" line
opacity-rule = [
  "90:class_g = 'Alacritty'",
  "85:class_g = 'fzf-filebrowser'",
  "80:class_g = 'dev.warp.Warp'",
  "90:class_g = 'i3bar'",
  "90:class_g = 'i3status'",
  "90:class_g = 'Polybar'"
];

#################################
#            Corners            #
#################################
corner-radius = 10;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#           Wintypes            #
#################################
wintypes:
{
  normal = { fade = true; shadow = false; }
  tooltip = { fade = true; shadow = true; opacity = 0.85; focus = true; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.9; }
  dropdown_menu = { opacity = 0.9; }
};

#################################
#         Driver Tweaks         #
#################################
xrender-sync-fence = true;
unredir-if-possible = false;
