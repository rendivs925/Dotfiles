#################################
#             Backend           #
#################################
backend = "egl";
vsync = true;

# EGL Performance Trio
# use-damage is mandatory for EGL smoothness to avoid redrawing static areas.
use-damage = true;
glx-no-rebind-pixmap = true;
glx-no-stencil = true;

#################################
#          Animations           #
#################################
animations = true;

animation-stiffness = 100.0;
animation-dampening = 24.0;
animation-clamping = false;
animation-mass = 0.4;

transition-length = 200;

animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-transient-window = "zoom";
animation-for-workspace-switch-in = "zoom";
animation-for-workspace-switch-out = "zoom";

#################################
#             Fading            #
#################################
fading = true;
# Fading steps must be small to avoid "staircase" flickering during the zoom.
fade-delta = 3;
fade-in-step = 0.02;
fade-out-step = 0.02;

#################################
#        Opacity & Rules        #
#################################
inactive-opacity = 1.0;
active-opacity = 1.0;

opacity-rule = [
  "90:class_g = 'Alacritty'",
  "85:class_g = 'fzf-filebrowser'",
  "80:class_g = 'dev.warp.Warp'",
  "90:class_g = 'i3bar'",
  "90:class_g = 'i3status'",
  "90:class_g = 'Polybar'"
];

#################################
#            Corners            #
#################################
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#           Wintypes            #
#################################
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.85; focus = true; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  menu = { fade = true; }
  popup_menu = { opacity = 0.9; }
  dropdown_menu = { opacity = 0.9; }
};

#################################
#         Driver Tweaks         #
#################################
# Required for modern NVIDIA/AMD drivers to sync frames correctly
xrender-sync-fence = true;
unredir-if-possible = false;
